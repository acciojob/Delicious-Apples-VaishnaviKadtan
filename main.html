 <!DOCTYPE html>
<html>
<head>
    <title>Apple Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #00c853, #00e676);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: flex;
            background: #f5f5f5;
            width: 900px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* LEFT SIDE */
        .product__photo {
            background: #8bc34a;
            padding: 20px;
            width: 45%;
        }

        .photo-container {
            text-align: center;
        }

        .photo-main img {
            width: 250px;
        }

        .photo-album ul {
            display: flex;
            justify-content: center;
            padding: 0;
            margin-top: 20px;
            list-style: none;
        }

        .photo-album ul li {
            margin: 5px;
            border: 1px solid #ddd;
            padding: 5px;
            background: white;
            border-radius: 5px;
        }

        .photo-album ul li img {
            width: 50px;
        }

        /* RIGHT SIDE */
        .product__info {
            padding: 30px;
            width: 55%;
        }

        .product__info h1 {
            margin-top: 0;
        }

        .price {
            font-size: 40px;
            color: red;
            margin: 20px 0;
        }

        .variant {
            margin: 20px 0;
        }

        .variant span {
            display: inline-block;
            margin-right: 10px;
            cursor: pointer;
        }

        .variant img {
            width: 40px;
        }

        .description {
            margin-top: 20px;
        }

        .description h3 {
            margin-bottom: 10px;
        }

        .description ul {
            padding-left: 20px;
        }

        .add-cart {
            margin-top: 30px;
        }

        .add-cart button {
            background: #ff5252;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .add-cart button:hover {
            background: #ff1744;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="product__photo">
        <div class="photo-container">

            <!-- Main Photo -->
            <div class="photo-main">
                <img src="https://i.imgur.com/1bX5QH6.png" alt="Green Apple">
            </div>

            <!-- Photo Album -->
            <div class="photo-album">
                <ul>
                    <li><img src="https://i.imgur.com/1bX5QH6.png" alt="Apple View 1"></li>
                    <li><img src="https://i.imgur.com/7yUvePI.png" alt="Apple View 2"></li>
                    <li><img src="https://i.imgur.com/qR3sQ6L.png" alt="Apple View 3"></li>
                    <li><img src="https://i.imgur.com/EXAMPLE.png" alt="Apple View 4"></li>
                </ul>
            </div>

        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="product__info">

        <h1>Delicious Apples</h1>

        <!-- Price -->
        <div class="price">
            $7.93
        </div>

        <!-- Variants -->
        <div class="variant">
            <strong>Select a Color:</strong><br><br>
            <span><img src="https://i.imgur.com/1bX5QH6.png" alt="Green"></span>
            <span><img src="https://i.imgur.com/YellowExample.png" alt="Yellow"></span>
            <span><img src="https://i.imgur.com/OrangeExample.png" alt="Orange"></span>
            <span><img src="https://i.imgur.com/RedExample.png" alt="Red"></span>
        </div>

        <!-- Benefits -->
        <div class="description">
            <h3>BENEFITS</h3>
            <ul>
                <li>Apples are nutritious</li>
                <li>May help with weight loss</li>
                <li>Good for heart and bone health</li>
                <li>Linked to lower risk of diabetes</li>
            </ul>
        </div>

        <!-- Add to Cart -->
        <div class="add-cart">
            <button>ADD TO CART</button>
        </div>

    </div>

</div>

</body>
</html>
